services:
  - type: web
    name: coral-sre-agent
    runtime: node
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORAL_VERSION
        value: v0.4.0
      - key: DATABASE_URL
        sync: false
