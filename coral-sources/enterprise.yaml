name: enterprise
version: 0.1.0
dsl_version: 3
backend: jsonl
tables:
  - name: tickets
    description: Unified ticketing system (Jira, Azure Boards, ClickUp, Linear)
    source:
      location: "__CORAL_DATA_URI__"
      glob: "enterprise_tickets.jsonl"
    columns:
      - name: id
        type: Utf8
      - name: board
        type: Utf8
      - name: title
        type: Utf8
      - name: status
        type: Utf8
      - name: priority
        type: Utf8
      - name: assignee
        type: Utf8
      - name: service
        type: Utf8
      - name: created_at
        type: Utf8

  - name: change_requests
    description: ServiceNow & CAB Change Request tickets
    source:
      location: "__CORAL_DATA_URI__"
      glob: "enterprise_change_requests.jsonl"
    columns:
      - name: id
        type: Utf8
      - name: system
        type: Utf8
      - name: service
        type: Utf8
      - name: version
        type: Utf8
      - name: status
        type: Utf8
      - name: requester
        type: Utf8
      - name: scheduled_at
        type: Utf8
      - name: risk_level
        type: Utf8

  - name: knowledge_base
    description: Confluence, Notion, and Wiki recovery runbooks
    source:
      location: "__CORAL_DATA_URI__"
      glob: "enterprise_knowledge_base.jsonl"
    columns:
      - name: id
        type: Utf8
      - name: platform
        type: Utf8
      - name: title
        type: Utf8
      - name: service
        type: Utf8
      - name: runbook_steps
        type: Utf8
      - name: last_updated_at
        type: Utf8
